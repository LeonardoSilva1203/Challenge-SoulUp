<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotta</title>

    <script src="contato.js" defer></script>
    <link rel="stylesheet" href="../css/contato.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>

    <header class="header">
        <a href="../../index.html">
        <img src="../images/Logo.svg" alt="Logo da Rotta" class="logo">
        </a>
        
        
        <nav>
            <ul>
                <li><a href="../../index.html" class="cabecalho">Home</a></li>
                <li><a href="./integrantes.html" class="cabecalho">Integrantes</a></li>
                <li><a href="./sobre.html" class="cabecalho">Sobre</a></li>
                <li><a href="./faq.html" class="cabecalho">FAQ</a></li>
                <li><a href="./contato.html" class="cabecalho active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contato-hero">
            <span class="subtitulo">Fale Conosco</span>
            <h1>Entre em Contato</h1>
            <p class="slogan">Preencha o formulário abaixo para se cadastrar e nos enviar sua dúvida.</p>
        </section>

        <section class="contato-form-section">
            <form id="contatoForm" novalidate>

                <h3>Seus Dados</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome Completo <span class="obrigatorio">*</span></label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                        <span class="error-msg" id="erro-nome"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail <span class="obrigatorio">*</span></label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                        <span class="error-msg" id="erro-email"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label for="assunto">Assunto <span class="obrigatorio">*</span></label>
                        <select id="assunto" name="assunto" required>
                            <option value="" disabled selected>Selecione um assunto</option>
                            <option value="duvida">Dúvida Geral</option>
                            <option value="suporte">Suporte Técnico</option>
                            <option value="parceria">Parceria</option>
                            <option value="outro">Outro</option>
                        </select>
                        <span class="error-msg" id="erro-assunto"></span>
                    </div>
                </div>

                <hr>

                <h3>Sua Mensagem</h3>

                <div class="form-group">
                    <label for="mensagem">Dúvida ou Mensagem <span class="obrigatorio">*</span></label>
                    <textarea id="mensagem" name="mensagem" rows="5"
                        placeholder="Escreva sua dúvida ou mensagem aqui..." required></textarea>
                    <span class="error-msg" id="erro-mensagem"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termos" name="termos" required>
                        <span>Concordo com os <a href="#">termos de uso</a> e <a href="#">política de
                                privacidade</a>.</span>
                    </label>
                    <span class="error-msg" id="erro-termos"></span>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn-reset">Limpar</button>
                    <button type="submit" class="btn-enviar">
                        <span>Enviar Mensagem</span>
                        <i class="ti ti-send"></i>
                    </button>
                </div>

            </form>

            <div id="sucesso-msg" class="sucesso-msg hidden">
                <i class="ti ti-circle-check"></i>
                <h2>Mensagem enviada!</h2>
                <p>Obrigado pelo contato. Retornaremos em breve.</p>
                <button class="btn-enviar" onclick="resetForm()">Nova Mensagem</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Rotta. Todos os direitos reservados.</p>
    </footer>
